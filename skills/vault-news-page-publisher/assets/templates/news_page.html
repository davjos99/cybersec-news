<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{TITLE}</title>
  <style>
    :root {
      --bg-dark: #0c0c0e;
      --bg-card: #15151a;
      --text-primary: #f5f5f5;
      --text-secondary: #a8a8b0;
      --accent-cyan: #5adcf0;
      --accent-yellow: #ffd54f;
      --accent-green: #82e682;
      --accent-red: #ff7a7a;
      --border: #2a2a32;
    }
    [data-theme="light"] {
      --bg-dark: #fafafa;
      --bg-card: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #555;
      --accent-cyan: #0091ad;
      --accent-yellow: #b8860b;
      --accent-green: #228822;
      --accent-red: #c0392b;
      --border: #e0e0e0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      line-height: 1.6;
      padding: 2rem 1rem;
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }
    .container { max-width: 880px; margin: 0 auto; }
    header {
      border-bottom: 2px solid var(--border);
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 1rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .meta {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
    .toggle {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .toggle:hover { border-color: var(--accent-cyan); }
    section {
      background: var(--bg-card);
      border-left: 4px solid var(--border);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border-radius: 0 8px 8px 0;
    }
    section.threats { border-left-color: var(--accent-red); }
    section.news { border-left-color: var(--accent-cyan); }
    section.advice { border-left-color: var(--accent-green); }
    h2 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }
    section.threats h2 { color: var(--accent-red); }
    section.news h2 { color: var(--accent-cyan); }
    section.advice h2 { color: var(--accent-green); }
    ul { list-style: none; padding: 0; }
    li {
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
    }
    li:last-child { border-bottom: none; }
    li strong {
      color: var(--text-primary);
      font-weight: 700;
      display: block;
      margin-bottom: 0.25rem;
    }
    li a {
      color: var(--accent-cyan);
      text-decoration: none;
      font-size: 0.85rem;
    }
    li a:hover { text-decoration: underline; }
    li p { color: var(--text-secondary); font-size: 0.95rem; }
    footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.85rem;
      text-align: center;
    }
    .no-items {
      color: var(--text-secondary);
      font-style: italic;
      padding: 0.5rem 0;
    }
    @media (max-width: 600px) {
      body { padding: 1rem 0.5rem; }
      h1 { font-size: 1.5rem; }
      section { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>{TITLE}</h1>
        <div class="meta">Window: last {WINDOW_HOURS} hours &middot; {SOURCES_POLLED} sources polled &middot; {ITEMS_KEPT} items kept</div>
      </div>
      <button class="toggle" onclick="toggleTheme()">Light / Dark</button>
    </header>

    <section class="threats">
      <h2>Threats</h2>
      {THREATS_HTML}
    </section>

    <section class="news">
      <h2>News</h2>
      {NEWS_HTML}
    </section>

    <section class="advice">
      <h2>Advice</h2>
      {ADVICE_HTML}
    </section>

    <footer>
      Generated {GENERATED_AT} UTC
      {FOOTER_NOTE}
    </footer>
  </div>

  <script>
    function toggleTheme() {
      const root = document.documentElement;
      const current = root.getAttribute("data-theme");
      const next = current === "light" ? "dark" : "light";
      root.setAttribute("data-theme", next);
      localStorage.setItem("cybersec-briefing-theme", next);
    }
    (function() {
      const saved = localStorage.getItem("cybersec-briefing-theme");
      if (saved) document.documentElement.setAttribute("data-theme", saved);
    })();
  </script>
</body>
</html>
